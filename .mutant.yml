---
usage: opensource

environment_variables:
  RAILS_ENV: test
  MUTANT: "1"

hooks:
  - .mutant/hooks.rb

requires:
  - ./config/environment

integration:
  name: rspec

matcher:
  subjects:
    # Models
    - Game
    - GameMember
    - GameFile
    - Character
    - CharacterVersion
    - Scene
    - SceneParticipant
    - Post
    - User
    - UserProfile
    - Invitation
    - NotificationPreference
    - PostRead
    # Presenters
    - PostPresenter
    # Components
    - Shared::PostItemComponent
    - Shared::PostComposerComponent
    - Shared::SidebarComponent
    # Services
    - EmailContentExtractor
    # Controllers
    - ScenesController
    - CharactersController
    - GamesController
    - SceneParticipantsController
    - PostsController
    - GameFilesController
    - InvitationsController
    - GameMembersController
    - CharacterVersionsController
    - ProfilesController
    - PlayerManagementController
    - Users::SessionsController
    # Adapters
    - MailerNotifier
    - MailerInvitationSender
    - ActiveStorageFileStore
    # Jobs
    - PostDigestJob
    # Mailers
    - NotificationMailer
    - InvitationMailer
    # Mailboxes
    - SceneMailbox
    # Helpers
    - ApplicationHelper

mutation:
  timeout: 10.0

coverage_criteria:
  timeout: false
  process_abort: false
  test_result: true
