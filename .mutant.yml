---
usage: opensource

environment_variables:
  RAILS_ENV: test
  MUTANT: "1"

hooks:
  - .mutant/hooks.rb

requires:
  - ./config/environment

integration:
  name: rspec

matcher:
  subjects:
    # Models
    - AiUsage
    - Game
    - RssToken
    - SceneSummary
    - GameExportRequest
    - GameMember
    - GameFile
    - Character
    - CharacterVersion
    - Scene
    - SceneParticipant
    - Post
    - User
    - UserProfile
    - Invitation
    - NotificationPreference
    - PostRead
    # Presenters
    - GameFilePresenter
    - PostPresenter
    - SceneSummaryPresenter
    - ScenePresenter
    - UserPresenter
    # Components
    - Shared::AiSummariesToggleComponent
    - Shared::RssTokenComponent
    - Shared::SceneSummaryComponent
    - Shared::SceneSummaryEntryComponent
    - Shared::SceneSummaryFormComponent
    - Shared::SceneSummaryIndexPageComponent
    - Shared::GalleryComponent
    - Shared::NavShellComponent
    - Shared::PostComposerComponent
    - Shared::PostItemComponent
    - Shared::SceneCardComponent
    - Shared::SidebarComponent
    - Shared::TreeNodeComponent
    - Ui::BadgeComponent
    - Ui::BreadcrumbComponent
    - Ui::ButtonComponent
    - Ui::GlowComponent
    # Services
    - EmailContentExtractor
    - GameExportService
    - MarkdownRenderer
    - SceneSummaryService
    # Controllers
    - ActionMailbox::Ingresses::Resend::InboundEmailsController
    - SceneSummariesController
    - GameExportsController
    - ScenesController
    - CharactersController
    - GamesController
    - SceneParticipantsController
    - PostsController
    - GameFilesController
    - InvitationsController
    - GameMembersController
    - CharacterVersionsController
    - ProfilesController
    - PlayerManagementController
    - Users::SessionsController
    # Jobs
    - PostDigestJob
    - ExportJob
    - SceneSummaryJob
    # Mailers
    - NotificationMailer
    - InvitationMailer
    - ExportMailer
    # Mailboxes
    - SceneMailbox
    # Helpers
    - ApplicationHelper

mutation:
  timeout: 20.0

coverage_criteria:
  timeout: false
  process_abort: false
  test_result: true
